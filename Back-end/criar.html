<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/cadastro.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar login</title>
</head>
<body>
    <div>
        <h1 class="flex items-center justify-center text-3xl font-bold">Crie seu login!</h1>
        
    </div>
    <div class="flex items-center justify-center gap-4 mt-4">
        <input type="text" id="novo-usuario" placeholder="Seu Nome"></div>
    <div class="flex items-center justify-center gap-4 mt-4">
        <input type="password" id="nova-senha" placeholder="Senha"></div>
    <div class="flex items-center justify-center mt-4">
        <a onclick="cadastrar()" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700" href="index.html">Cadastrar</a>
    </div>
    
</body>
</html>
